
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500&family=Inter:wght@400;500&display=swap');

  .promo-wrap {
    background: #eff6e8;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    border-radius: 50px;
    position: relative;
  }
  .promo-text { flex: 1; min-width: 0; }
  .promo-heading {
    font-family: 'Baloo 2', 'Trebuchet MS', sans-serif;
    font-size: 32px;
    font-weight: 400;
    color: #002A31;
    margin: 0 0 4px;
    line-height: 1.1;
  }
  .promo-desc {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #002A31;
    margin: 0;
  }
  .coupon-code {
    display: inline-block;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #002A31;
    background: rgba(0,42,49,0.1);
    border: 1.5px dashed #002A31;
    border-radius: 6px;
    padding: 2px 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    user-select: none;
  }
  .coupon-code:hover { background: rgba(0,42,49,0.16); }
  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #002A31;
    color: #fff;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 5px 12px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #002A31;
  }
  .coupon-code:hover .tooltip { opacity: 1; }
  .tooltip.copied { opacity: 1; }

  .countdown {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .cd-box {
    background: #002A31;
    color: #fff;
    border-radius: 8px;
    padding: 8px 14px;
    text-align: center;
    min-width: 62px;
  }
  .cd-num {
    font-family: 'Baloo 2', 'Trebuchet MS', sans-serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1;
    display: block;
  }
  .cd-label {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-top: 3px;
  }

  .shop-btn {
    font-family: 'Baloo 2', 'Trebuchet MS', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    background: #91ae71;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .shop-btn:hover { background: #7d9a5e; }

  .close-btn {
    /* position: absolute; */
    top: 10px; right: 12px;
    background: none;
    border: none;
    font-size: 18px;
    color: #002A31;
    cursor: pointer;
    line-height: 1;
    opacity: 0.5;
  }
  .close-btn:hover { opacity: 1; }
</style>

<div class="promo-wrap" id="promoBanner">
  <div class="promo-text">
    <p class="promo-heading">Special Offer — 30% OFF</p>
    <p class="promo-desc">
      Your coupon:&nbsp;
      <span class="coupon-code" id="couponCode" onclick="copyCoupon()">
        #SALECOUPON
        <span class="tooltip" id="tooltip">Click to copy</span>
      </span>
    </p>
  </div>

  <div class="countdown">
    <div class="cd-box"><span class="cd-num" id="cd-days">02</span><span class="cd-label">Days</span></div>
    <div class="cd-box"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Hours</span></div>
    <div class="cd-box"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Minutes</span></div>
    <div class="cd-box"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Seconds</span></div>
  </div>

  <button class="shop-btn">Shop Now</button>
  <button class="close-btn" onclick="document.getElementById('promoBanner').style.display='none'" aria-label="Close">&#x2715;</button>
</div>

<script>
  const endTime = Date.now() + 2 * 24 * 60 * 60 * 1000;

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = Math.max(0, endTime - Date.now());
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-days').textContent = pad(days);
    document.getElementById('cd-hours').textContent = pad(hours);
    document.getElementById('cd-mins').textContent = pad(mins);
    document.getElementById('cd-secs').textContent = pad(secs);
  }

  tick();
  setInterval(tick, 1000);

  function copyCoupon() {
    const code = 'SALECOUPON';
    const tip = document.getElementById('tooltip');
    navigator.clipboard.writeText(code).then(() => {
      tip.textContent = 'Copied!';
      tip.classList.add('copied');
      setTimeout(() => {
        tip.textContent = 'Click to copy';
        tip.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = code; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      tip.textContent = 'Copied!';
      tip.classList.add('copied');
      setTimeout(() => { tip.textContent = 'Click to copy'; tip.classList.remove('copied'); }, 2000);
    });
  }
</script>
